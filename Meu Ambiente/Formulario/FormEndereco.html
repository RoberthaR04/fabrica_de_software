<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meu ambiente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Estilos Globais */
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #77fa8f;
            font-family: Arial, Helvetica, sans-serif;
            color: #020202;
        }

        /* Estilo para o header */
        header {
            width: 100%;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg);
        }

        h1 {
            font-size: 2.5rem;
            font-size: larger;
            color: #fdfdfd;
        }

        /* Estilo dos cards */
        .card {
            background-color: #fdfdfd;
            border: none;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            position: center;
            height: 50%;
            width: 400px;
            padding: 20px;
        }

        .container {
            margin-top: 30px;
        }

        .btn-primary{
            position: relative;
        }
    </style>
</head>

<body>
    <!-- Cabeçalho com fundo em degradê -->
    <header>
        <h1>Login</h1>
    </header>
    <div class="card">
    <form>
        <div class="mb-3">
            <label for="exemploInputEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="exemploInputEmail" aria-describedby="emailHelp">
        </div>
        <div class="mb-3">
            <label for="exemploInputSenha" class="form-label">Senha</label>
            <input type="senha" class="form-control" id="exemploInputSenha">
        </div>
        <div class="md-3 form-check">
            <input type="checkbox" class="form-check-input" id="exemploCheck">
            <label class="form-cehck-label" for="exemploCheck">Autorizo o uso de criptografia</label>
        </div>
        <button type="submit" class="btn btn-primary">Enviar</button>
    </form>
    </div>

</body>

</html>
