<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meu ambiente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Importa a biblioteca CSS do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Importa a biblioteca de ícones do Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* Estilos Globais */
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #77fa8f;
            font-family: Arial, Helvetica, sans-serif;
            color: #020202;
        }

        /* Estilo para o header */
        header {
            text-align: center;
            background-color: #2E7D32;
            padding: 40px;
        }

        .logo {
            width: 120px;
            margin-bottom: 10px;
        }

        header h1 {
            color: #fdfdfd;
            font-size: 3rem;
            font-family: monospace;
        }


        /* Estilo dos cards */
        .card {
            background-color: #fdfdfd;
            border: none;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            position: center;
            height: 50%;
            width: 400px;
            padding: 20px;
        }

        .container {
            margin-top: 30px;
        }

        .btn-primary {
            position: relative;
        }
    </style>
</head>

<body>
    <header>
        <h1>Denúncias</h1>
    </header>
    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <div>

                <a href="index.html" class="btn btn-light">Início</a>
                <a href="Lista.html" class="btn btn-light">Categorias</a>
                <a href="Indicadores.html" class="btn btn-light">Indicadores</a>
                <a href="Denuncias.html" class="btn btn-light">Denúnciar</a>

            </div>
        </div>
    </nav>

    <!-- Formulário de Inscrição -->
    <div class="container">
        <h2>Formulário de Inscrição</h2>
        <form id="formInscricao" novalidate>
            <!-- Nome -->
            <div class="mb-3">
                <label for="nome" class="form-label">Nome <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="nome" placeholder="Digite seu nome" required>
            </div>

            <!-- Data de nascimento -->
            <div class="mb-3">
                <label for="nascimento" class="form-label">Data de Nascimento <span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="nascimento" required>
            </div>

            <!-- Endereço -->
            <div class="mb-3">
                <label for="endereco" class="form-label">Endereço <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="endereco" placeholder="Digite seu endereço" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
            </div>

            <!-- Sexo -->
            <div class="mb-3">
                <label for="sexo" class="form-label">Sexo <span class="text-danger">*</span></label>
                <select class="form-select" id="sexo" required>
                    <option selected disabled>Selecione seu sexo</option>
                    <option value="masculino">Masculino</option>
                    <option value="feminino">Feminino</option>
                    <option value="outro">Pobre</option>
                </select>
            </div>

            <!-- Contato -->
            <div class="mb-3">
                <label for="contato" class="form-label">Contato <span class="text-danger">*</span></label>
                <input type="tel" class="form-control" id="contato" placeholder="(99) 99999-9999" required>
            </div>

            <!-- Aceite de Termos -->
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="aceiteTermos" required>
                <label class="form-check-label" for="aceiteTermos">
                    Aceito os <a href="#">termos e condições</a>
                </label>
            </div>

            <!-- Botão de Inscrição -->
            <button type="submit" class="btn btn-primary">Inscreva-se</button>
        </form>
    </div>
    <footer>
        <div class="container text-center">
            <div class="row">
                <div class="col-12">
                    <p>&copy; Meu Ambiente. Todos os direitos reservados.</p>
                    <p>Feito por Robertha Rezende.</p>
                </div>
                <a
                    href="https://www.linkedin.com/in/robertha-de-sousa-rezende-0b15b8215/?originalSubdomain=br">Contato</a>
    </footer>
</body>

</html>
