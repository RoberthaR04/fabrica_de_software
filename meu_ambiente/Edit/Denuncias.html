<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meu ambiente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Importa a biblioteca CSS do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Importa a biblioteca de ícones do Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* Estilos Globais */
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: rgb(151, 255, 131);
            font-family: Arial, Helvetica, sans-serif;
            color: #020202;
        }

        /* Estilo para o header */
        header {
            text-align: center;
            background-color: #2E7D32;
            padding: 40px;
        }

        .logo {
            width: 120px;
            margin-bottom: 10px;
        }

        header h1 {
            color: #fdfdfd;
            font-size: 3rem;
            font-family: monospace;
        }

        .barra-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background-color: #fdfdfd;
            border: none;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            position: center;
            height: 50%;
            width: 100px;
            padding: 20px;
        }

        .form-box {
            max-width: 500px;
            margin: 60px auto;
            padding: 30px;
            background-color: #f4f7f4;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgb(0, 0, 0, 0.15);

        }

        .container {
            margin-top: 30px;
        }

        .btn-primary {
            position: relative;
        }
    </style>
</head>

<body>
    <header>
        <h1>Denúncias</h1>
    </header>
    <nav class="navbar">
        <div class="container justify-content-center">

            <a href="../Inicio/Inicio.html" class="btn btn-success mx-2">Início</a>
            <a href="../Lista/Lista.html" class="btn btn-success mx-2">Categorias</a>
            <a href="../Visualizacao/Indicadores.html" class="btn btn-success mx-2">Indicadores</a>
            <a href="../Edit/Denuncias.html" class="btn btn-success mx-2">Denunciar</a>

        </div>
    </nav>
    <div class="container">
        <div class="form-box">

            <h3 class="text-center mb-4">Formulário de Denúncia</h3>

            <form>

                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" class="form-control" placeholder="Digite seu nome">
                </div>

                <div class="mb-3">
                    <label class="form-label">Endereço da denúncia</label>
                    <input type="text" class="form-control" placeholder="Digite o local">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo de resíduo</label>
                    <select class="form-select">
                        <option>Papel</option>
                        <option>Vidro</option>
                        <option>Plástico</option>
                        <option>Metal</option>
                        <option>Resíduo perigoso</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descrição</label>
                    <textarea class="form-control" rows="3"></textarea>
                </div>

                <button class="btn btn-success w-100">
                    Enviar denúncia
                </button>

            </form>

        </div>
    </div>
    <footer>
        <div class="container text-center">
            <div class="row">
                <div class="col-12">
                    <p>&copy; Meu Ambiente. Todos os direitos reservados.</p>
                    <p>Feito por Robertha Rezende.</p>
                </div>
                <a
                    href="https://www.linkedin.com/in/robertha-de-sousa-rezende-0b15b8215/?originalSubdomain=br">Contato</a>
    </footer>
</body>

</html>
