<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meu ambiente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: rgb(151, 255, 131);
            font-family: Arial, Helvetica, sans-serif;
            color: #020202;
        }

        header {
            text-align: center;
            background-color: #2E7D32;
            padding: 40px;
        }

        .logo {
            width: 120px;
            margin-bottom: 10px;
        }

        header h1 {
            color: #fdfdfd;
            font-size: 3rem;
            font-family: monospace;
        }

        .barra-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background-color: #fdfdfd;
            border: none;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            position: center;
            height: 50%;
            width: 400px;
            padding: 20px;
        }

        .container {
            margin-top: 30px;
        }

        .btn-primary {
            position: relative;
        }
    </style>
</head>

<body>
    <header>
        <h1>Indicadores</h1>
    </header>
    <nav class="navbar">
        <div class="container justify-content-center">

            <a href="../Inicio/Inicio.html" class="btn btn-success mx-2">Início</a>
            <a href="../Lista/Lista.html" class="btn btn-success mx-2">Categorias</a>
            <a href="../Visualizacao/Indicadores.html" class="btn btn-success mx-2">Indicadores</a>
            <a href="../Edit/Denuncias.html" class="btn btn-success mx-2">Denunciar</a>

        </div>
    </nav>
    <div class="container mt-5">
        <h2 class="text-center">Tipos de lixo coletados</h2>
        <canvas id="meuGrafico"></canvas>
    </div>
    <footer>
        <div class="container text-center">
            <div class="row">
                <div class="col-12">
                    <p>&copy; Meu Ambiente. Todos os direitos reservados.</p>
                    <p>Feito por Robertha Rezende.</p>
                </div>
                <a
                    href="https://www.linkedin.com/in/robertha-de-sousa-rezende-0b15b8215/?originalSubdomain=br">Contato</a>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ctx = document.getElementById('meuGrafico');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Papel', 'Vidro', 'Plástico', 'Metal', 'Madeira', 'Resíduos perigosos', 'Resíduos radioativos', 'Lixo hospitalar'],
                datasets: [{
                    label: 'Quantidade de resíduos em toneladas',
                    data: [1000, 1500, 8000, 2400, 1100, 6000, 2300, 8900],
                    backgroundColor: [
                        '#2196F3',
                        '#4CAF50',
                        '#F44336',
                        '#FFC107',
                        '#795548',
                        '#FF9800',
                        '#9C27B0',
                        '#FFFFFF'
                    ]
                }]
            },
            options: {
                responsive: true
            }
        });
    </script>
</body>

</html>
